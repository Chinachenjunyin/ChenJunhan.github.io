<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小小雨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --text: #000;
    --text-muted: #444;
    --accent: #b0855a;
    --accent-hover: #8c6640;
    --owner-color: #d48806;
    --danger: #c0392b;
    --glass-bg: rgba(255, 255, 255, 0.45);
    --glass-border: rgba(255, 255, 255, 0.35);
    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    --tag-bg: rgba(255, 255, 255, 0.28);
    --tag-text: #5c3e20;
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
    position: relative;
    isolation: isolate;
    text-shadow: 0 1px 2px rgba(255,255,255,0.3);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -3;
    background: url('bg.jpg') center/cover no-repeat;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(ellipse 80% 70% at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 75% 60%, rgba(255,255,255,0.06) 0%, transparent 65%);
    backdrop-filter: blur(1px) saturate(1.05);
  }

  .bg-wallpaper {
    position: fixed;
    inset: 0;
    z-index: -3;
    width: 100vw;
    height: 100dvh;
    max-height: 100vh;
    object-fit: cover;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -2;
    width: 100vw;
    height: 100dvh;
    max-height: 100vh;
    background:
      radial-gradient(ellipse 80% 70% at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 75% 60%, rgba(255,255,255,0.06) 0%, transparent 65%);
    backdrop-filter: blur(1px) saturate(1.05);
  }

  .noise-layer {
    position: fixed; inset: 0; z-index: -1; opacity: 0.04; pointer-events: none;
    width: 100vw;
    height: 100dvh;
    max-height: 100vh;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  }

  .noise-layer {
    position: fixed; inset: 0; z-index: -1; opacity: 0.04; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  }

  /* ---- nav ---- */
  nav {
    background: rgba(251, 247, 242, 0.75);
    backdrop-filter: blur(40px) saturate(2.2);
    -webkit-backdrop-filter: blur(40px) saturate(2.2);
    border-bottom: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.08);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  nav .logo {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    text-shadow: 0 1px 4px rgba(255,255,255,0.3);
  }

  nav .nav-links {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  nav .nav-links a, nav .nav-links button {
    text-decoration: none;
    color: var(--text-muted);
    font-size: 15px;
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
    transition: color 0.2s;
    text-shadow: 0 1px 2px rgba(255,255,255,0.2);
  }

  nav .nav-links a:hover, nav .nav-links button:hover { color: var(--accent); }

  .user-menu {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-badge {
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 13px;
    padding: 2px 12px;
    border-radius: 12px;
    font-weight: 500;
  }

  .admin-link {
    color: var(--accent) !important;
    font-weight: 600 !important;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    border: none;
    font-weight: 500;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
  }

  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .btn-outline:hover {
    background: var(--accent);
    color: #fff;
  }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  .btn-danger:hover {
    background: var(--danger);
    color: #fff;
  }

  .btn-sm {
    padding: 4px 12px;
    font-size: 12px;
  }

  /* ---- container ---- */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .page-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }

  .page-subtitle {
    color: var(--text-muted);
    font-size: 15px;
    margin-bottom: 36px;
  }

  /* ---- post cards ---- */
  .post-card {
    background: var(--glass-bg);
    backdrop-filter: blur(36px) saturate(2.0);
    -webkit-backdrop-filter: blur(36px) saturate(2.0);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--glass-shadow);
    border: 1px solid var(--glass-border);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    border: 1px solid var(--glass-border);
    transition: all 0.3s ease;
  }

  .post-card:hover {
    box-shadow: 0 12px 40px rgba(155, 127, 104, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6);
    transform: translateY(-3px);
    background: rgba(251, 247, 242, 0.7);
  }

  .post-card h2 {
    font-size: 20px;
    margin-bottom: 8px;
    color: var(--text);
  }

  .post-meta {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .post-excerpt {
    font-size: 15px;
    color: var(--text-muted);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: 500;
  }

  .owner-tag {
    display: inline-block;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    color: #92400e;
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: 600;
    border: 1px solid #fcd34d;
  }

  /* ---- post detail ---- */
  .post-detail { display: none; }
  .post-detail.active { display: block; }
  .post-list.hidden { display: none; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    cursor: pointer;
    font-size: 15px;
    margin-bottom: 24px;
    border: none;
    background: none;
    font-family: inherit;
  }

  .back-btn:hover { color: var(--accent-hover); }

  .post-detail h1 {
    font-size: 28px;
    margin-bottom: 12px;
    line-height: 1.3;
  }

  .post-detail .post-meta {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(201, 165, 125, 0.25);
  }

  .post-content h2 { font-size: 22px; margin: 32px 0 12px; }
  .post-content h3 { font-size: 18px; margin: 24px 0 8px; }
  .post-content p { margin-bottom: 16px; font-size: 16px; }
  .post-content ul, .post-content ol { margin: 12px 0 16px 24px; }
  .post-content li { margin-bottom: 6px; }

  .post-content pre {
    background: rgba(58, 50, 46, 0.9);
    color: #e8d5c4;
    border-radius: var(--radius);
    padding: 16px 20px;
    overflow-x: auto;
    margin: 16px 0;
    font-size: 14px;
    line-height: 1.6;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .post-content code {
    background: rgba(234, 215, 192, 0.4);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 14px;
  }

  .post-content pre code { background: none; padding: 0; }

  .post-content blockquote {
    border-left: 3px solid var(--accent);
    padding: 8px 16px;
    margin: 16px 0;
    color: var(--text-muted);
    background: rgba(234, 215, 192, 0.25);
    border-radius: 0 var(--radius) var(--radius) 0;
  }

  .article-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid rgba(201, 165, 125, 0.2);
  }

  /* ---- modal ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(16px) saturate(1.4);
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(40px) saturate(2.2);
    -webkit-backdrop-filter: blur(40px) saturate(2.2);
    border-radius: var(--radius);
    padding: 32px;
    width: 90%;
    max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    border: 1px solid var(--glass-border);
  }

  .modal h2 {
    font-size: 22px;
    margin-bottom: 20px;
    text-align: center;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .form-group input, .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid rgba(201, 165, 125, 0.3);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: rgba(255,255,255,0.6);
    transition: border-color 0.2s;
    color: var(--text);
    resize: vertical;
  }

  .form-group input:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  .modal-link {
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .modal-link a {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
  }

  .modal-link a:hover { text-decoration: underline; }

  .error-msg {
    color: var(--danger);
    font-size: 13px;
    margin-top: 8px;
    text-align: center;
  }

  /* ---- media upload ---- */
  .media-upload-area {
    border: 2px dashed rgba(201, 165, 125, 0.3);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    margin-bottom: 16px;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .media-upload-area:hover {
    border-color: var(--accent);
  }

  .media-upload-area input[type="file"] {
    display: none;
  }

  .media-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
  }

  .media-preview-item {
    position: relative;
    width: 100px;
    height: 100px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--glass-border);
    background: rgba(0,0,0,0.05);
  }

  .media-preview-item img, .media-preview-item video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .media-preview-item .media-remove {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 12px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
  }

  .post-content img, .post-content video {
    max-width: 100%;
    border-radius: 8px;
    margin: 10px 0;
  }

  /* ---- collage / album ---- */
  .collage-section {
    background: var(--glass-bg);
    backdrop-filter: blur(22px) saturate(1.6);    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid var(--glass-border);
  }

  .collage-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .collage-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
    min-height: 60px;
    align-items: center;
  }

  .collage-item {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid transparent;
    cursor: grab;
    transition: border-color 0.2s;
  }

  .collage-item.dragging {
    opacity: 0.5;
    border-color: var(--accent);
  }

  .collage-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .collage-item .collage-idx {
    position: absolute;
    top: 2px;
    left: 2px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 10px;
    line-height: 18px;
    text-align: center;
  }

  .collage-item .collage-remove {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 12px;
    line-height: 18px;
    text-align: center;
    cursor: pointer;
  }

  .collage-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* ---- collage display in article ---- */
  .image-collage {
    display: grid;
    gap: 6px;
    margin: 16px 0;
    border-radius: 12px;
    overflow: hidden;
  }

  .image-collage.cols-1 { grid-template-columns: 1fr; }
  .image-collage.cols-2 { grid-template-columns: 1fr 1fr; }
  .image-collage.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .image-collage.cols-4 { grid-template-columns: 1fr 1fr; }

  .image-collage img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    margin: 0 !important;
    border-radius: 0 !important;
  }

  .image-collage.cols-1 img { height: auto; max-height: 500px; }

  .collage-item .collage-arrow {
    position: absolute;
    bottom: 2px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: none;
    border-radius: 4px;
    width: 22px;
    height: 18px;
    font-size: 12px;
    cursor: pointer;
    line-height: 16px;
    padding: 0;
  }

  .collage-item .collage-arrow.left { left: 2px; }
  .collage-item .collage-arrow.right { right: 2px; }

  /* ---- publish card ---- */
  .publish-card {
    background: var(--glass-bg);
    backdrop-filter: blur(36px) saturate(2.0);
    -webkit-backdrop-filter: blur(36px) saturate(2.0);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: var(--glass-shadow);
    border: 1px solid var(--glass-border);
  }

  .publish-card h3 {
    font-size: 18px;
    margin-bottom: 16px;
  }

  .tag-input {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag-input .tag-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 12px;
  }

  .tag-input .tag-item .remove-tag {
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    margin-left: 2px;
  }

  .tag-input input {
    border: 1px solid rgba(201, 165, 125, 0.3);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    background: rgba(255,255,255,0.6);
    width: 120px;
    font-family: inherit;
  }

  .tag-input input:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* ---- admin panel ---- */
  .admin-panel { display: none; }
  .admin-panel.active { display: block; }

  .admin-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--glass-bg);
    backdrop-filter: blur(36px) saturate(2.0);
    -webkit-backdrop-filter: blur(36px) saturate(2.0);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 24px;
    border: 1px solid var(--glass-border);
  }

  .admin-table th, .admin-table td {
    padding: 12px 16px;
    text-align: left;
    font-size: 14px;
    border-bottom: 1px solid rgba(201, 165, 125, 0.15);
  }

  .admin-table th {
    background: rgba(234, 215, 192, 0.3);
    color: var(--text-muted);
    font-weight: 600;
    font-size: 13px;
  }

  .admin-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--glass-border);
  }

  .admin-tabs button {
    flex: 1;
    padding: 10px;
    border: none;
    background: var(--glass-bg);
    color: var(--text-muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s;
  }

  .admin-tabs button.active {
    background: var(--accent);
    color: #fff;
  }

  footer {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-muted);
    font-size: 13px;
    border-top: 1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(36px) saturate(2.0);
    -webkit-backdrop-filter: blur(36px) saturate(2.0);
  }

  @media (max-width: 600px) {
    .container { padding: 20px 14px 60px; }
    .post-card { padding: 18px; }
    .post-detail h1 { font-size: 24px; }
    .modal { padding: 24px; }
    nav .nav-links { gap: 10px; }
    .admin-table th, .admin-table td { padding: 8px 10px; font-size: 12px; }
  }

  /* ---- avatar ---- */
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(201, 165, 125, 0.5);
    vertical-align: middle;
  }

  .card-thumb {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 14px;
    display: block;
  }

  .card-thumb-video {
    width: 100%;
    max-height: 240px;
    border-radius: 10px;
    margin-bottom: 14px;
    display: block;
    background: #000;
  }

  .card-preview {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 12px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
  }

  .card-preview img, .card-preview video {
    display: none;
  }

  .read-more {
    color: var(--accent);
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
  }

  .read-more:hover { text-decoration: underline; }

  .avatar-lg {
    width: 60px; height: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(201, 165, 125, 0.5);
  }

  .avatar-cell {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--glass-border);
  }

  .profile-overlay {
    text-align: center;
    margin-bottom: 16px;
  }

  .profile-overlay .avatar-lg {
    display: block;
    margin: 0 auto 8px;
  }

  /* ---- comments ---- */
  .comment-section {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--glass-border);
  }

  .comment-section h3 {
    font-size: 18px;
    margin-bottom: 16px;
  }

  .comment-item {
    background: var(--glass-bg);
    backdrop-filter: blur(28px) saturate(1.8);
    -webkit-backdrop-filter: blur(28px) saturate(1.8);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid var(--glass-border);
  }

  .comment-item .comment-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .comment-item .comment-username {
    font-size: 14px;
    font-weight: 600;
  }

  .comment-item .comment-time {
    font-size: 12px;
    color: var(--text-muted);
  }

  .comment-item .comment-content {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
  }

  .comment-image {
    display: block;
    max-width: 200px;
    max-height: 200px;
    border-radius: 8px;
    margin-bottom: 8px;
    object-fit: cover;
  }

  .comment-form-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .comment-item .comment-delete {
    font-size: 12px;
    color: var(--danger);
    cursor: pointer;
    background: none;
    border: none;
    margin-left: auto;
    font-family: inherit;
  }

  .comment-form {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    align-items: flex-end;
  }

  .comment-form textarea {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--glass-bg);
    backdrop-filter: blur(22px) saturate(1.6);    color: var(--text);
    resize: vertical;
    min-height: 44px;
    max-height: 120px;
  }

  .comment-form textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .comment-login-hint {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 16px;
  }

  .comment-login-hint a {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
  }

  .comment-replies {
    margin-top: 8px;
    padding-left: 28px;
    border-left: 2px solid var(--glass-border);
  }

  .reply-item {
    margin-bottom: 6px;
    padding: 10px 14px;
  }

  .reply-form {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 12px;
    align-items: flex-end;
  }

  .reply-form textarea {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    font-size: 13px;
    font-family: inherit;
    background: var(--glass-bg);
    backdrop-filter: blur(22px) saturate(1.6);    color: var(--text);
    resize: vertical;
    min-height: 36px;
    max-height: 100px;
  }

  .reply-form textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(1.8);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--glass-bg);
    backdrop-filter: blur(36px) saturate(2.0);
    -webkit-backdrop-filter: blur(36px) saturate(2.0);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    cursor: pointer;
    z-index: 9998;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--text);
    transition: transform 0.2s;
    user-select: none;
  }
  .music-btn:hover { transform: scale(1.1); }
  .music-btn.playing { animation: musicPulse 2s ease-in-out infinite; }
  @keyframes musicPulse {
    0%, 100% { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    50% { box-shadow: 0 4px 24px rgba(201,165,125,0.3); }
  }

  .music-bar {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    background: var(--glass-bg);
    backdrop-filter: blur(36px) saturate(2.0);
    -webkit-backdrop-filter: blur(36px) saturate(2.0);
    border: 1px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    max-width: 420px;
    width: calc(100vw - 32px);
  }
  .mbar-btn {
    background: none;
    border: none;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    flex-shrink: 0;
  }
  .mbar-title {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
    flex-shrink: 0;
  }
  .mbar-progress {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    min-width: 40px;
  }
  .mbar-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.15s linear;
    pointer-events: none;
  }
  .mbar-time {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    min-width: 32px;
    text-align: right;
  }
  .mbar-vol-wrap {
    flex-shrink: 0;
    width: 60px;
  }
  .mbar-vol {
    width: 100%;
    height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .mbar-vol::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .mbar-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    padding: 2px;
    line-height: 1;
    flex-shrink: 0;
  }
  .music-bar iframe {
    display: block;
    border: none;
  }

  .music-panel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    max-height: 420px;
    background: var(--glass-bg);
    backdrop-filter: blur(36px) saturate(2.0);
    -webkit-backdrop-filter: blur(36px) saturate(2.0);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.25);
    z-index: 10000;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .music-panel.show { display: flex; }
  .music-panel-header {
    display: flex;
    align-items: center;
    padding: 10px;
    gap: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .music-panel-header input {
    flex: 1;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    background: rgba(255,255,255,0.4);
    color: var(--text);
    font-family: inherit;
    min-width: 0;
  }
  .music-panel-header input::placeholder { color: var(--text-muted); }
  .music-search-list { overflow-y: auto; flex: 1; }
  .music-item {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    transition: background 0.15s;
    color: var(--text);
  }
  .music-item:hover { background: rgba(255,255,255,0.25); }
  .music-item-name { display: block; font-size: 14px; font-weight: 500; }
  .music-item-artist { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>

<div class="noise-layer"></div>
<img class="bg-wallpaper" src="bg.jpg" alt="">

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">
  <div class="modal" id="authModalInner"></div>
</div>

<!-- Publish Modal -->
<div class="modal-overlay" id="publishModal">
  <div class="modal" style="max-width:600px" id="publishModalInner"></div>
</div>

<nav>
  <span class="logo" onclick="showList()">小小雨</span>
  <div class="nav-links">
    <a href="#" onclick="showList()">文章</a>
    <span id="navUser"></span>
  </div>
</nav>

<div class="container">
  <div class="post-list" id="postList">
    <h1 class="page-title">所有文章</h1>
    <p class="page-subtitle">记录技术、生活与思考</p>
    <div id="publishArea"></div>
    <div id="posts"></div>
  </div>

  <div class="post-detail" id="postDetail"></div>

  <div class="admin-panel" id="adminPanel">
    <h1 class="page-title">后台管理</h1>
    <div class="admin-tabs">
      <button class="active" onclick="switchAdminTab('articles')">文章管理</button>
      <button id="adminTabUsers" onclick="switchAdminTab('users')">用户管理</button>
      <button id="adminTabSettings" onclick="switchAdminTab('settings')" style="display:none">站点设置</button>
    </div>
    <div id="adminContent"></div>
  </div>
</div>

<footer>&copy; 2026 小小雨</footer>

<script>
const API = '/api';
let currentUser = null;
let allPosts = [];
let adminTab = 'articles';

function authHeaders() {
  const t = localStorage.getItem('token');
  return t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
}

function formatDate(iso) {
  if (!iso) return '';
  return iso.slice(0, 10);
}

function saveAuth(token, user) {
  localStorage.setItem('token', token);
  currentUser = user;
  updateNav();
}

function logout() {
  localStorage.removeItem('token');
  currentUser = null;
  updateNav();
  showList();
}

function updateNav() {
  const el = document.getElementById('navUser');
  if (!currentUser) {
    el.innerHTML = '<a href="#" onclick="showAuth(\'login\')">登录</a><a href="#" onclick="showAuth(\'register\')">注册</a>';
  } else {
    const avatarHtml = currentUser.avatar
      ? `<img class="avatar" src="${escapeHtml(currentUser.avatar)}" alt="">`
      : '';
    let html = '<div class="user-menu">';
    html += '<span class="user-badge" style="cursor:pointer" onclick="showProfile()">' + (avatarHtml ? avatarHtml + ' ' : '') + escapeHtml(currentUser.username) + '</span>';
    if (currentUser.role === 'admin') {
      html += '<a href="#" class="admin-link" onclick="showAdmin()">管理</a>';
    }
    html += '<button onclick="showPublish()">写文章</button>';
    html += '<button onclick="logout()">退出</button>';
    html += '</div>';
    el.innerHTML = html;
  }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showAuth(mode) {
  const m = document.getElementById('authModalInner');
  const isLogin = mode === 'login';
  m.innerHTML = `
    <h2>${isLogin ? '登录' : '注册'}</h2>
    <div class="error-msg" id="authError"></div>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="请输入邮箱">
    </div>
    ${!isLogin ? '<div class="form-group"><label>用户名</label><input type="text" id="authUsername" placeholder="请输入用户名"></div>' : ''}
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="请输入密码">
    </div>
    <div class="form-actions">
      <button class="btn btn-outline btn-sm" onclick="closeAuth()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="doAuth('${mode}')">${isLogin ? '登录' : '注册'}</button>
    </div>
    <div class="modal-link">
      ${isLogin ? '没有账号？<a onclick="showAuth(\'register\')">立即注册</a>' : '已有账号？<a onclick="showAuth(\'login\')">立即登录</a>'}
    </div>
  `;
  document.getElementById('authModal').classList.add('active');
}

function showLoginToast() {
  if (localStorage.getItem('loginToastDismissed')) return;
  const toast = document.getElementById('loginToast');
  setTimeout(() => toast.classList.add('show'), 800);
  setTimeout(() => toast.classList.remove('show'), 10000);
}

function dismissLoginToast() {
  localStorage.setItem('loginToastDismissed', '1');
  document.getElementById('loginToast').classList.remove('show');
}

function closeAuth() {
  document.getElementById('authModal').classList.remove('active');
}

async function doAuth(mode) {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value.trim();
  const username = mode === 'register' ? document.getElementById('authUsername').value.trim() : '';
  const errEl = document.getElementById('authError');
  errEl.textContent = '';

  if (!email || !password || (mode === 'register' && !username)) {
    errEl.textContent = '请填写完整信息';
    return;
  }

  const url = mode === 'login' ? API + '/login' : API + '/register';
  const body = mode === 'login' ? { email, password } : { email, password, username };

  try {
    const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await resp.json();
    if (!resp.ok) { errEl.textContent = data.error; return; }
    saveAuth(data.token, data.user);
    closeAuth();
    loadPosts();
  } catch (e) {
    errEl.textContent = '网络错误，请重试';
  }
}

function showPublish(editPost) {
  const m = document.getElementById('publishModalInner');
  const isEdit = !!editPost;
  m.innerHTML = `
    <h2>${isEdit ? '编辑文章' : '发布文章'}</h2>
    <div class="error-msg" id="pubError"></div>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="pubTitle" value="${isEdit ? escapeHtml(editPost.title) : ''}" placeholder="文章标题">
    </div>
    <div class="form-group">
      <label>标签（回车添加）</label>
      <div class="tag-input" id="tagInput">
        <span id="tagList"></span>
        <input type="text" id="tagField" placeholder="输入标签">
      </div>
    </div>
    <div class="form-group">
      <label>内容（支持 HTML，点击下方媒体可插入）</label>
      <textarea id="pubContent" rows="12" placeholder="文章内容...">${isEdit ? editPost.content : ''}</textarea>
    </div>
    <div class="form-group">
      <label>上传图片 / 视频</label>
      <div class="media-upload-area" onclick="document.getElementById('mediaFileInput').click()">
        <input type="file" id="mediaFileInput" accept="image/*,video/*" onchange="uploadMedia(event)" multiple>
        <p style="color:var(--text-muted);font-size:13px">点击上传或拖拽文件，支持 jpg/png/gif/webp/mp4/webm/mov</p>
      </div>
      <div class="media-preview" id="mediaPreview"></div>
    </div>
    <div class="collage-section">
      <div class="collage-label">图片拼图（上传多张图片组成拼图，可调整顺序）</div>
      <input type="file" id="collageFileInput" accept="image/*" onchange="addCollageImages(event)" multiple style="display:none">
      <div class="collage-grid" id="collageGrid"></div>
      <div class="collage-actions">
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('collageFileInput').click()">+ 添加图片</button>
        <button class="btn btn-primary btn-sm" onclick="insertCollage()">插入拼图到文章</button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline btn-sm" onclick="closePublish()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="${isEdit ? "doUpdate('" + editPost.id + "')" : 'doPublish()'}">${isEdit ? '保存修改' : '发布'}</button>
    </div>
  `;
  document.getElementById('publishModal').classList.add('active');
  let tags = isEdit ? [...(editPost.tags || [])] : [];
  renderTags(tags);
  document.getElementById('tagField').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const v = this.value.trim();
      if (v && !tags.includes(v)) {
        tags.push(v);
        renderTags(tags);
        this.value = '';
      }
    }
  });
  window._pubTags = tags;
  window._uploadedMedia = [];
  window._collageImages = [];
  renderMediaPreview();
  renderCollage();
}

function renderTags(tags) {
  const el = document.getElementById('tagList');
  el.innerHTML = tags.map((t, i) => `<span class="tag-item">${escapeHtml(t)}<span class="remove-tag" onclick="removeTag(${i})">&times;</span></span>`).join('');
}

function removeTag(i) {
  window._pubTags.splice(i, 1);
  renderTags(window._pubTags);
}

function closePublish() {
  document.getElementById('publishModal').classList.remove('active');
}

async function uploadMedia(event) {
  const files = event.target.files;
  if (!files.length) return;
  const errEl = document.getElementById('pubError');
  for (const file of files) {
    const formData = new FormData();
    formData.append('file', file);
    try {
      const resp = await fetch(API + '/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }, body: formData });
      const data = await resp.json();
      if (!resp.ok) { errEl.textContent = data.error; return; }
      window._uploadedMedia.push(data);
      renderMediaPreview();
      insertMedia(data.url, data.type);
    } catch (e) { errEl.textContent = '上传失败'; }
  }
  event.target.value = '';
}

function renderMediaPreview() {
  const el = document.getElementById('mediaPreview');
  if (!el) return;
  const media = window._uploadedMedia || [];
  el.innerHTML = media.map((m, i) => {
    let inner = '';
    if (m.type === 'video') {
      inner = '<video src="' + escapeHtml(m.url) + '"></video>';
    } else {
      inner = '<img src="' + escapeHtml(m.url) + '" alt="">';
    }
    return `
      <div class="media-preview-item">
        ${inner}
        <button class="media-remove" onclick="removeMedia(${i})">&times;</button>
      </div>
    `;
  }).join('');
}

function removeMedia(i) {
  window._uploadedMedia.splice(i, 1);
  renderMediaPreview();
}

function insertMedia(url, type) {
  const textarea = document.getElementById('pubContent');
  if (!textarea) return;
  let tag = '';
  if (type === 'video') {
    tag = '<video src="' + url + '" controls style="max-width:100%;border-radius:8px;margin:10px 0"></video>';
  } else {
    tag = '<img src="' + url + '" alt="" style="max-width:100%;border-radius:8px;margin:10px 0">';
  }
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  textarea.value = textarea.value.substring(0, start) + tag + textarea.value.substring(end);
  textarea.focus();
  textarea.setSelectionRange(start + tag.length, start + tag.length);
}

window._collageImages = [];

async function addCollageImages(event) {
  const files = event.target.files;
  if (!files.length) return;
  for (const file of files) {
    const formData = new FormData();
    formData.append('file', file);
    try {
      const resp = await fetch(API + '/upload', {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }, body: formData
      });
      const data = await resp.json();
      if (resp.ok && data.type === 'image') {
        window._collageImages.push(data.url);
      }
    } catch (e) {}
  }
  event.target.value = '';
  renderCollage();
}

function renderCollage() {
  const el = document.getElementById('collageGrid');
  if (!el) return;
  const imgs = window._collageImages || [];
  el.innerHTML = imgs.map((url, i) => `
    <div class="collage-item" draggable="true"
         ondragstart="collageDragStart(event, ${i})"
         ondragover="event.preventDefault()"
         ondrop="collageDrop(event, ${i})">
      <img src="${escapeHtml(url)}" alt="">
      <span class="collage-idx">${i + 1}</span>
      <span class="collage-remove" onclick="removeCollageItem(${i})">&times;</span>
      ${i > 0 ? `<button class="collage-arrow left" onclick="event.stopPropagation();moveCollageItem(${i}, -1)">◀</button>` : ''}
      ${i < imgs.length - 1 ? `<button class="collage-arrow right" onclick="event.stopPropagation();moveCollageItem(${i}, 1)">▶</button>` : ''}
    </div>
  `).join('');
}

function moveCollageItem(from, dir) {
  const to = from + dir;
  if (to < 0 || to >= window._collageImages.length) return;
  const arr = window._collageImages;
  [arr[from], arr[to]] = [arr[to], arr[from]];
  renderCollage();
}

function removeCollageItem(i) {
  window._collageImages.splice(i, 1);
  renderCollage();
}

let collageDragIdx = -1;
function collageDragStart(e, i) { collageDragIdx = i; }
function collageDrop(e, i) {
  e.preventDefault();
  if (collageDragIdx === -1 || collageDragIdx === i) return;
  const arr = window._collageImages;
  const dragged = arr.splice(collageDragIdx, 1)[0];
  arr.splice(i, 0, dragged);
  collageDragIdx = -1;
  renderCollage();
}

function insertCollage() {
  const imgs = window._collageImages || [];
  if (!imgs.length) { alert('请先添加拼图图片'); return; }
  const cols = imgs.length >= 4 ? 4 : imgs.length;
  const html = '<div class="image-collage cols-' + cols + '">' +
    imgs.map(u => '<img src="' + u + '" alt="">').join('') + '</div>';
  const textarea = document.getElementById('pubContent');
  if (!textarea) return;
  const start = textarea.selectionStart;
  textarea.value = textarea.value.substring(0, start) + html + textarea.value.substring(textarea.selectionEnd);
  textarea.focus();
  textarea.setSelectionRange(start + html.length, start + html.length);
}

async function doPublish() {
  const title = document.getElementById('pubTitle').value.trim();
  const content = document.getElementById('pubContent').value.trim();
  const tags = window._pubTags || [];
  const errEl = document.getElementById('pubError');
  errEl.textContent = '';
  if (!title || !content) { errEl.textContent = '标题和内容不能为空'; return; }

  try {
    const resp = await fetch(API + '/articles', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ title, content, tags }) });
    const data = await resp.json();
    if (!resp.ok) { errEl.textContent = data.error; return; }
    closePublish();
    loadPosts();
  } catch (e) { errEl.textContent = '网络错误'; }
}

async function doUpdate(id) {
  const title = document.getElementById('pubTitle').value.trim();
  const content = document.getElementById('pubContent').value.trim();
  const tags = window._pubTags || [];
  const errEl = document.getElementById('pubError');
  errEl.textContent = '';
  if (!title || !content) { errEl.textContent = '标题和内容不能为空'; return; }

  try {
    const resp = await fetch(API + '/articles/' + id, { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ title, content, tags }) });
    const data = await resp.json();
    if (!resp.ok) { errEl.textContent = data.error; return; }
    closePublish();
    loadPosts();
    showPostById(id);
  } catch (e) { errEl.textContent = '网络错误'; }
}

async function deleteArticle(id) {
  if (!confirm('确认删除这篇文章？')) return;
  try {
    await fetch(API + '/articles/' + id, { method: 'DELETE', headers: authHeaders() });
    showList();
    loadPosts();
  } catch (e) {}
}

async function loadPosts() {
  try {
    const resp = await fetch(API + '/articles');
    allPosts = await resp.json();
  } catch (e) {
    allPosts = [];
  }
  renderPosts();
}

function extractPreview(content) {
  const div = document.createElement('div');
  div.innerHTML = content;
  let firstMedia = null;
  const img = div.querySelector('img');
  const video = div.querySelector('video');
  if (img) {
    firstMedia = { type: 'image', url: img.getAttribute('src') };
  } else if (video) {
    firstMedia = { type: 'video', url: video.getAttribute('src') };
  }
  const textPreview = div.textContent.replace(/\s+/g, ' ').trim().substring(0, 200);
  return { firstMedia, textPreview };
}

function renderPosts() {
  const container = document.getElementById('posts');
  const publishArea = document.getElementById('publishArea');

  if (currentUser) {
    publishArea.innerHTML = `
      <div class="publish-card">
        <h3>有什么想分享的？</h3>
        <button class="btn btn-primary btn-sm" onclick="showPublish()">写文章</button>
      </div>
    `;
  } else {
    publishArea.innerHTML = '';
  }

  if (allPosts.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px">暂无文章</p>';
    return;
  }

  container.innerHTML = allPosts.map(p => {
    const created = formatDate(p.createdAt);
    let tagsHtml = p.tags.map(t => '<span class="tag">' + escapeHtml(t) + '</span>').join('');
    if (p.isOwner) {
      tagsHtml = '<span class="owner-tag">站长</span>' + tagsHtml;
    }

    const { firstMedia, textPreview } = extractPreview(p.content);
    let mediaHtml = '';
    if (firstMedia) {
      if (firstMedia.type === 'video') {
        mediaHtml = `<video class="card-thumb-video" src="${escapeHtml(firstMedia.url)}" controls playsinline preload="metadata"></video>`;
      } else {
        mediaHtml = `<img class="card-thumb" src="${escapeHtml(firstMedia.url)}" alt="" loading="lazy">`;
      }
    }

    return `
      <article class="post-card">
        ${mediaHtml}
        <h2 onclick="showPostById('${p.id}')" style="cursor:pointer">${escapeHtml(p.title)}</h2>
        <div class="post-meta">
          <span>${created}</span>
          <span>${p.authorAvatar ? '<img class="avatar" src="' + escapeHtml(p.authorAvatar) + '" alt="" style="width:18px;height:18px;margin-right:4px">' : ''}${escapeHtml(p.authorName)}</span>
          ${tagsHtml}
        </div>
        ${textPreview ? '<div class="card-preview">' + textPreview + '</div>' : ''}
        <a class="read-more" onclick="showPostById('${p.id}')">阅读全文 →</a>
      </article>
    `;
  }).join('');
}

async function showPostById(id) {
  let post = allPosts.find(p => p.id === id);
  if (!post) {
    try {
      const resp = await fetch(API + '/articles/' + id);
      post = await resp.json();
    } catch (e) { return; }
  }
  if (!post) return;

  document.getElementById('postList').classList.add('hidden');
  document.getElementById('adminPanel').classList.remove('active');
  const detail = document.getElementById('postDetail');
  const created = formatDate(post.createdAt);
  let tagsHtml = post.tags.map(t => '<span class="tag">' + escapeHtml(t) + '</span>').join('');
  if (post.isOwner) {
    tagsHtml = '<span class="owner-tag">站长</span>' + tagsHtml;
  }

  let actionsHtml = '';
  if (currentUser && (currentUser.id === post.authorId || currentUser.isOwner)) {
    actionsHtml = `
      <div class="article-actions">
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();showPublish(allPosts.find(p=>p.id==='${post.id}'))">编辑</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteArticle('${post.id}')">删除</button>
      </div>
    `;
  }

  detail.innerHTML = `
    <button class="back-btn" onclick="showList()">← 返回文章列表</button>
    <h1>${escapeHtml(post.title)}</h1>
    <div class="post-meta">
      <span>${created}</span>
      <span>${post.authorAvatar ? '<img class="avatar" src="' + escapeHtml(post.authorAvatar) + '" alt="" style="width:18px;height:18px;margin-right:4px">' : ''}${escapeHtml(post.authorName)}</span>
      ${tagsHtml}
    </div>
    <div class="post-content">${post.content.replace(/<img\b/g, '<img loading="lazy" decoding="async"')}</div>
    ${actionsHtml}
    <div class="comment-section" id="commentSection">
      <h3>评论</h3>
      <div id="commentList"><p style="color:var(--text-muted);text-align:center;padding:16px">加载中...</p></div>
      ${currentUser ? `
        <div class="comment-form">
          <textarea id="commentInput" placeholder="写下你的评论..." rows="1"></textarea>
          <div class="comment-form-actions">
            <button class="btn btn-primary btn-sm" onclick="submitComment('${post.id}')">发表</button>
            <label class="btn btn-outline btn-sm" style="cursor:pointer">
              <input type="file" accept="image/*" onchange="uploadCommentImage(event, 'commentImg')" style="display:none">
              <img id="commentImg" src="" style="display:none;width:60px;height:60px;object-fit:cover;border-radius:8px;vertical-align:middle">
              <span id="commentImgBtn">图片</span>
            </label>
            <button id="commentImgClear" class="btn btn-outline btn-sm" style="display:none" onclick="clearCommentImage('commentImg')">清除图片</button>
          </div>
        </div>
      ` : `
        <div class="comment-login-hint">
          <a href="#" onclick="showAuth('login')">登录</a> 后参与评论
        </div>
      `}
    </div>
  `;
  detail.classList.add('active');
  window.scrollTo(0, 0);
  loadComments(post.id);
}

async function loadComments(articleId) {
  const el = document.getElementById('commentList');
  window._currentArticleId = articleId;
  try {
    const resp = await fetch(API + '/articles/' + articleId + '/comments');
    const comments = await resp.json();
    if (comments.length === 0) {
      el.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:16px">暂无评论</p>';
      return;
    }
    const parents = comments.filter(c => !c.parentId);
    const replies = comments.filter(c => c.parentId);
    el.innerHTML = parents.map(c => {
      const childReplies = replies.filter(r => r.parentId === c.id);
      return renderComment(c, childReplies, articleId);
    }).join('');
  } catch (e) { el.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:16px">加载失败</p>'; }
}

function renderComment(c, replies, articleId) {
  const avatarHtml = c.avatar ? '<img class="avatar" src="' + escapeHtml(c.avatar) + '" alt="" style="width:22px;height:22px">' : '';
  const canDelete = currentUser && (currentUser.id === c.authorId || currentUser.isOwner);
  const replyHtml = currentUser ? '<button class="comment-delete" style="color:var(--accent)" onclick="showReplyForm(\'' + articleId + '\', \'' + c.id + '\', \'' + escapeHtml(c.username) + '\')">回复</button>' : '';
  let repliesHtml = '';
  if (replies.length > 0) {
    repliesHtml = '<div class="comment-replies">' + replies.map(r => {
      const rAvatar = r.avatar ? '<img class="avatar" src="' + escapeHtml(r.avatar) + '" alt="" style="width:20px;height:20px">' : '';
      const rCanDelete = currentUser && (currentUser.id === r.authorId || currentUser.isOwner);
      const rReply = r.replyTo ? ' 回复 <b>' + escapeHtml(r.replyTo) + '</b>' : '';
      return `
        <div class="comment-item reply-item">
          <div class="comment-header">
            ${rAvatar}
            <span class="comment-username">${escapeHtml(r.username)}</span>
            <span class="comment-time">${formatDate(r.createdAt)}</span>
            ${rCanDelete ? '<button class="comment-delete" onclick="deleteComment(\'' + articleId + '\', \'' + r.id + '\')">删除</button>' : ''}
          </div>
          <div class="comment-content">${r.image ? '<img class="comment-image" src="' + escapeHtml(r.image) + '" alt="" loading="lazy">' : ''}${rReply}: ${escapeHtml(r.content)}</div>
        </div>
      `;
    }).join('') + '</div>';
  }
  return `
    <div class="comment-item">
      <div class="comment-header">
        ${avatarHtml}
        <span class="comment-username">${escapeHtml(c.username)}</span>
        <span class="comment-time">${formatDate(c.createdAt)}</span>
        ${replyHtml}
        ${canDelete ? '<button class="comment-delete" onclick="deleteComment(\'' + articleId + '\', \'' + c.id + '\')">删除</button>' : ''}
      </div>
      <div class="comment-content">${c.image ? '<img class="comment-image" src="' + escapeHtml(c.image) + '" alt="" loading="lazy">' : ''}${escapeHtml(c.content)}</div>
      ${repliesHtml}
    </div>
    <div id="replyForm-${c.id}" class="reply-form" style="display:none">
      <textarea id="replyInput-${c.id}" placeholder="写下你的回复..." rows="1"></textarea>
      <button class="btn btn-primary btn-sm" onclick="submitReply('${articleId}', '${c.id}')">回复</button>
      <button class="btn btn-outline btn-sm" onclick="hideReplyForm('${c.id}')">取消</button>
    </div>
  `;
}

function showReplyForm(articleId, parentId, username) {
  hideAllReplyForms();
  const form = document.getElementById('replyForm-' + parentId);
  if (form) {
    form.style.display = 'flex';
    const input = document.getElementById('replyInput-' + parentId);
    if (input) { input.placeholder = '回复 ' + username + '...'; input.focus(); }
  }
}

function hideReplyForm(parentId) {
  const form = document.getElementById('replyForm-' + parentId);
  if (form) form.style.display = 'none';
}

function hideAllReplyForms() {
  document.querySelectorAll('.reply-form').forEach(f => f.style.display = 'none');
}

async function submitReply(articleId, parentId) {
  const input = document.getElementById('replyInput-' + parentId);
  if (!input) return;
  const content = input.value.trim();
  if (!content) return;
  try {
    const resp = await fetch(API + '/articles/' + articleId + '/comments', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ content, parentId })
    });
    if (!resp.ok) { const d = await resp.json(); alert(d.error); return; }
    loadComments(articleId);
  } catch (e) { alert('网络错误'); }
}

async function submitComment(articleId) {
  const input = document.getElementById('commentInput');
  const content = input.value.trim();
  const imgEl = document.getElementById('commentImg');
  const imgUrl = imgEl ? imgEl.src : '';
  if (!content && !imgUrl) return;
  try {
    const resp = await fetch(API + '/articles/' + articleId + '/comments', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ content, image: imgUrl })
    });
    if (!resp.ok) { const d = await resp.json(); alert(d.error); return; }
    input.value = '';
    clearCommentImage('commentImg');
    loadComments(articleId);
  } catch (e) { alert('网络错误'); }
}

async function uploadCommentImage(event, imgId) {
  const file = event.target.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('file', file);
  try {
    const resp = await fetch(API + '/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }, body: formData });
    if (!resp.ok) { alert('上传失败'); return; }
    const data = await resp.json();
    const imgEl = document.getElementById(imgId);
    const btnEl = document.getElementById(imgId + 'Btn');
    const clearEl = document.getElementById(imgId + 'Clear');
    imgEl.src = data.url;
    imgEl.style.display = 'inline';
    if (btnEl) btnEl.style.display = 'none';
    if (clearEl) clearEl.style.display = 'inline';
  } catch (e) { alert('上传失败'); }
}

function clearCommentImage(imgId) {
  const imgEl = document.getElementById(imgId);
  const btnEl = document.getElementById(imgId + 'Btn');
  const clearEl = document.getElementById(imgId + 'Clear');
  imgEl.src = '';
  imgEl.style.display = 'none';
  if (btnEl) btnEl.style.display = 'inline';
  if (clearEl) clearEl.style.display = 'none';
}

async function deleteComment(articleId, commentId) {
  if (!confirm('确认删除这条评论？')) return;
  try {
    await fetch(API + '/articles/' + articleId + '/comments/' + commentId, {
      method: 'DELETE', headers: authHeaders()
    });
    loadComments(articleId);
  } catch (e) {}
}

function showList() {
  document.getElementById('postDetail').classList.remove('active');
  document.getElementById('adminPanel').classList.remove('active');
  document.getElementById('postList').classList.remove('hidden');
  window.scrollTo(0, 0);
}

async function showAdmin() {
  if (!currentUser || currentUser.role !== 'admin') return;
  document.getElementById('postDetail').classList.remove('active');
  document.getElementById('postList').classList.add('hidden');
  document.getElementById('adminPanel').classList.add('active');
  adminTab = 'articles';
  document.getElementById('adminTabUsers').style.display = currentUser.isOwner ? '' : 'none';
  document.getElementById('adminTabSettings').style.display = currentUser.isOwner ? '' : 'none';

  document.querySelector('.admin-tabs button').classList.add('active');

}

async function switchAdminTab(tab) {
  adminTab = tab;
  document.querySelectorAll('.admin-tabs button').forEach(b => {
    const t = b.textContent.includes('文章') ? 'articles' : b.textContent.includes('用户') ? 'users' : 'settings';
    b.classList.toggle('active', t === tab);
  });
  if (tab === 'articles') loadAdminArticles();
  else if (tab === 'users') loadAdminUsers();
  else loadAdminSettings();
}

        <tbody>

        <tbody>
          ${users.map(u => {

function loadAdminSettings() {
  const el = document.getElementById('adminContent');

        搜索关键词用 <code>KEYWORD</code> 占位，接口返回格式需为
        <code>{code:1, data:[{id:"歌曲ID", name:"歌名", artist:"歌手"}]}</code>
      </p>
      <div class="form-group">

      </div>

        <label>测试搜索</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="setTestKw" placeholder="输入歌名测试..." style="flex:1">
          <button class="btn btn-outline btn-sm" onclick="testMusicApi()">测试</button>
        </div>
      </div>
      <div id="setTestResult" style="font-size:12px;color:var(--text-muted);margin-top:4px"></div>
      <br>
      <button class="btn btn-primary" onclick="saveMusicApi()">保存设置</button>
    </div>
  `;
}

async function testMusicApi() {
  const url = document.getElementById('setMusicApi').value.trim();
  const kw = document.getElementById('setTestKw').value.trim();
  const res = document.getElementById('setTestResult');
  if (!url || !kw) { res.textContent = '请输入API地址和测试关键词'; return; }
  if (!url.includes('KEYWORD')) { res.textContent = 'API地址必须包含 KEYWORD 占位符'; return; }
  res.textContent = '测试中...';
  try {
    const resp = await fetch(url.replace('KEYWORD', encodeURIComponent(kw)));
    const data = await resp.json();
    if (data.code === 1 && data.data && data.data.length) {
      res.innerHTML = '<span style="color:#4caf50">成功！结果：</span>' + data.data.slice(0,3).map(s => s.name + ' - ' + s.artist).join(', ');
    } else {
      res.textContent = '返回数据格式不匹配';
    }
  } catch (e) { res.textContent = '请求失败: ' + e.message; }
}

function saveMusicApi() {
  const url = document.getElementById('setMusicApi').value.trim();
  if (url && !url.includes('KEYWORD')) { alert('API地址必须包含 KEYWORD 占位符'); return; }
  localStorage.setItem('musicApiUrl', url);
  alert('保存成功');
  loadAdminSettings();
}

async function adminEditArticle(id) {

    const resp = await fetch(API + '/articles/' + id);

    showPublish(post);
  } catch (e) {}
}

async function adminDeleteArticle(id) {

    const resp = await fetch(API + '/articles/' + id, { method: 'DELETE', headers: authHeaders() });

async function changeUserRole(userId, newRole) {

    const resp = await fetch(API + '/admin/users/' + userId, {

      body: JSON.stringify({ role: newRole })
    });

  } catch (e) { alert('网络错误'); }
}

function showResetPwd(userId, username) {
  const pwd = prompt('为 ' + username + ' 输入新密码（至少6位）:');
  if (!pwd || pwd.length < 6) { alert('密码至少6位'); return; }
  resetUserPwd(userId, pwd);
}

async function resetUserPwd(userId, newPwd) {
  try {
    const resp = await fetch(API + '/admin/users/' + userId + '/reset-password', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ password: newPwd })
    });
    if (!resp.ok) { const d = await resp.json(); alert(d.error); return; }
    alert('密码已重置');

  } catch (e) { alert('网络错误'); }
}

function showProfile() {

  const avatarImg = user.avatar
    ? `<img class="avatar-lg" id="avatarPreview" src="${escapeHtml(user.avatar)}" alt="">`
    : '<div class="avatar-lg" id="avatarPreview" style="display:inline-block;background:var(--glass-bg);border:3px solid rgba(201,165,125,0.5);border-radius:50%;line-height:60px;color:var(--text-muted);font-size:20px">?</div>';
  m.innerHTML = `
    <h2>个人信息</h2>
    <div class="error-msg" id="profileError"></div>
    <div class="profile-overlay">
      ${avatarImg}
      <p style="font-size:14px;margin-top:4px">${escapeHtml(user.username)}</p>
    </div>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="profileUsername" value="${escapeHtml(user.username)}">
    </div>
    <div class="form-group">
      <label>上传头像</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="file" id="avatarFileInput" accept="image/*" onchange="uploadAvatar(event)" style="display:none">
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('avatarFileInput').click()">选择图片</button>
        <span id="avatarUploadStatus" style="font-size:12px;color:var(--text-muted)"></span>
      </div>
    </div>
    <div class="form-group">
      <label>头像 URL</label>
      <input type="text" id="profileAvatar" value="${escapeHtml(user.avatar || '')}" placeholder="也可直接粘贴图片URL" oninput="previewAvatarUrl(this.value)">
    </div>
    <div class="form-actions" style="margin-bottom:8px">
      <button class="btn btn-outline btn-sm" onclick="closeAuth()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveProfile()">保存</button>
    </div>
    <hr style="border:none;border-top:1px solid var(--glass-border);margin:16px 0">
    <h3 style="font-size:16px;margin-bottom:12px;text-align:center">修改密码</h3>
    <div class="error-msg" id="passwordError"></div>
    <div class="form-group">
      <label>当前密码</label>
      <input type="password" id="currentPassword" placeholder="输入当前密码">
    </div>
    <div class="form-group">
      <label>新密码</label>
      <input type="password" id="newPassword" placeholder="至少6位">
    </div>
    <div class="form-group">
      <label>确认新密码</label>
      <input type="password" id="confirmPassword" placeholder="再次输入新密码">
    </div>
    <div class="form-actions">
      <button class="btn btn-outline btn-sm" onclick="closeAuth()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="changePassword()">修改密码</button>
    </div>
  `;
  document.getElementById('authModal').classList.add('active');
}

async function uploadAvatar(event) {
  const file = event.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('avatarUploadStatus');
  statusEl.textContent = '上传中...';
  const formData = new FormData();
  formData.append('file', file);
  try {
    const resp = await fetch(API + '/upload', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }, body: formData
    });
    const data = await resp.json();
    if (!resp.ok) { statusEl.textContent = data.error; return; }
    document.getElementById('profileAvatar').value = data.url;
    previewAvatarUrl(data.url);
    statusEl.textContent = '上传成功';
  } catch (e) { statusEl.textContent = '上传失败'; }
}

function previewAvatarUrl(url) {
  const preview = document.getElementById('avatarPreview');
  if (!preview) return;
  if (url && preview.tagName === 'DIV') {
    const img = document.createElement('img');
    img.className = 'avatar-lg';
    img.id = 'avatarPreview';
    img.src = url;
    preview.parentNode.replaceChild(img, preview);
  } else if (url && preview.tagName === 'IMG') {
    preview.src = url;
  }
}

async function saveProfile() {
  const username = document.getElementById('profileUsername').value.trim();
  const avatar = document.getElementById('profileAvatar').value.trim();
  const errEl = document.getElementById('profileError');
  errEl.textContent = '';
  if (!username) { errEl.textContent = '用户名不能为空'; return; }
  try {
    const resp = await fetch(API + '/me', {
      method: 'PUT', headers: authHeaders(),
      body: JSON.stringify({ username, avatar })
    });
    if (!resp.ok) { const d = await resp.json(); errEl.textContent = d.error; return; }
    closeAuth();
    const token = localStorage.getItem('token');
    const meResp = await fetch(API + '/me', { headers: { 'Authorization': 'Bearer ' + token } });
    currentUser = await meResp.json();
    updateNav();
    showList();
  } catch (e) { errEl.textContent = '网络错误'; }
}

async function changePassword() {
  const currentPassword = document.getElementById('currentPassword').value;
  const newPassword = document.getElementById('newPassword').value.trim();
  const confirmPassword = document.getElementById('confirmPassword').value.trim();
  const errEl = document.getElementById('passwordError');
  errEl.textContent = '';
  if (!currentPassword || !newPassword || !confirmPassword) {
    errEl.textContent = '请填写所有密码字段'; return;
  }
  if (newPassword.length < 6) { errEl.textContent = '新密码至少6位'; return; }
  if (newPassword !== confirmPassword) { errEl.textContent = '两次新密码不一致'; return; }
  try {
    const resp = await fetch(API + '/me/password', {
      method: 'PUT', headers: authHeaders(),
      body: JSON.stringify({ currentPassword, newPassword })
    });
    if (!resp.ok) { const d = await resp.json(); errEl.textContent = d.error; return; }
    closeAuth();
    showList();
  } catch (e) { errEl.textContent = '网络错误'; }
}

function init() {
  const token = localStorage.getItem('token');
  if (token) {
    fetch(API + '/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json())
      .then(data => {
        if (data.id) {
          currentUser = data;
          updateNav();
        } else {
          showLoginToast();
        }
      })
      .catch(() => { showLoginToast(); });
  } else {
    showLoginToast();
  }
  updateNav();
  loadPosts();
}

init();
function toggleMusic() {
  var hasMusic = localStorage.getItem('musicUrl') || localStorage.getItem('musicId');
  if (!hasMusic) {
    showMusicSearch();
    return;
  }
  var btn = document.getElementById('musicBtn');
  if (btn.classList.contains('playing')) {
    hideMusicBar();
  } else {
    showMusicBar();
  }
}

function showMusicBar() {
  var audio = document.getElementById('bgMusic');
  var musicUrl = localStorage.getItem('musicUrl');
  var musicLabel = localStorage.getItem('musicLabel') || '背景音乐';
  if (!musicUrl) return;
  // always reload when switching songs
  if (audio.getAttribute('data-url') !== musicUrl) {
    audio.src = musicUrl;
    audio.setAttribute('data-url', musicUrl);
    audio.load();
  }
  audio.volume = (parseInt(localStorage.getItem('musicVol')) || 50) / 100;
  document.getElementById('mbarVol').value = localStorage.getItem('musicVol') || 50;
  document.getElementById('mbarTitle').textContent = musicLabel;
  document.getElementById('musicBar').style.display = 'flex';
  document.getElementById('musicBtn').classList.add('playing');
  localStorage.setItem('musicOn', '1');
  audio.removeEventListener('timeupdate', mbarUpdate);
  audio.addEventListener('timeupdate', mbarUpdate);
  var playPromise = audio.play();
  if (playPromise) {
    playPromise.catch(function(e) {
      console.log('Autoplay blocked, waiting for user interaction');
    });
  }
}

async function uploadMusicFile(event) {
  var file = event.target.files[0];
  if (!file) return;
  if (!localStorage.getItem('token')) { alert('请先登录再上传音乐'); event.target.value = ''; return; }
  var formData = new FormData();
  formData.append('file', file);
  try {
    var resp = await fetch(API + '/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }, body: formData });
    var data = await resp.json();
    if (!resp.ok) { alert(data.error || '上传失败'); event.target.value = ''; return; }
    if (data.url) {
      var label = file.name.replace(/\.(mp3|MP3)$/, '');
      localStorage.setItem('musicUrl', data.url);
      localStorage.setItem('musicId', '');
      localStorage.setItem('musicLabel', label);
      localStorage.setItem('musicOn', '1');
      hideMusicSearch();
      // small delay to let audio element load
      setTimeout(function() { showMusicBar(); }, 300);
    }
  } catch(e) { alert('上传出错: ' + e.message); }
  event.target.value = '';
}

function hideMusicBar() {
  var audio = document.getElementById('bgMusic');
  audio.pause();
  audio.removeEventListener('timeupdate', mbarUpdate);
  document.getElementById('musicBar').style.display = 'none';
  document.getElementById('musicBtn').classList.remove('playing');
  localStorage.setItem('musicOn', '0');
}

function mbarToggle() {
  var audio = document.getElementById('bgMusic');
  var btn = document.getElementById('mbarPlay');
  if (audio.paused) {
    audio.play();
    btn.innerHTML = '&#10074;&#10074;';
  } else {
    audio.pause();
    btn.innerHTML = '&#9654;';
  }
}

var _mbarTimer = 0;
function mbarUpdate() {
  var audio = document.getElementById('bgMusic');
  var btn = document.getElementById('mbarPlay');
  btn.innerHTML = audio.paused ? '&#9654;' : '&#10074;&#10074;';
  if (!audio.paused && audio.duration) {
    var pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('mbarFill').style.width = pct + '%';
    var m = Math.floor(audio.currentTime / 60);
    var s = Math.floor(audio.currentTime % 60);
    document.getElementById('mbarTime').textContent = m + ':' + (s < 10 ? '0' : '') + s;
  }
}

function mbarSeek(e) {
  var audio = document.getElementById('bgMusic');
  if (!audio.duration) return;
  var rect = e.target.getBoundingClientRect();
  var pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function mbarVolume() {
  var v = document.getElementById('mbarVol').value;
  document.getElementById('bgMusic').volume = v / 100;
  localStorage.setItem('musicVol', v);
}

// double click or right click opens search panel
function _bindMusicBtn() {
  const btn = document.getElementById('musicBtn');
  if (btn) {
    btn.addEventListener('dblclick', function(e) { e.preventDefault(); showMusicSearch(); });
    btn.addEventListener('contextmenu', function(e) { e.preventDefault(); showMusicSearch(); });
  }
}
if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', _bindMusicBtn); }
else { _bindMusicBtn(); }

function showMusicSearch() {
  const panel = document.getElementById('musicPanel');
  const overlay = document.getElementById('musicOverlay');
  if (panel.classList.contains('show')) {
    hideMusicSearch();
    return;
  }
  panel.classList.add('show');
  overlay.style.display = 'block';
  document.getElementById('musicSearchInput').focus();
}

function hideMusicSearch() {
  document.getElementById('musicPanel').classList.remove('show');
  document.getElementById('musicOverlay').style.display = 'none';
}

function searchMusic() {
  const kw = document.getElementById('musicSearchInput').value.trim();
  if (!kw) return;
  window.open('https://music.163.com/#/search/m/?s=' + encodeURIComponent(kw), '_blank');
  alert('在打开的网易云页面中找到歌曲 → 点击分享/复制链接 → 把链接中 id= 后面的数字输入到下方');
}

async function searchMusicOnline() {
  const kw = document.getElementById('musicSearchInput').value.trim();
  if (!kw) return;
  const list = document.getElementById('musicSearchList');
  list.innerHTML = '<div style="padding:12px;color:var(--text-muted);text-align:center">搜索中...</div>';
  const apiUrl = localStorage.getItem('musicApiUrl');
  const searchUrl = apiUrl
    ? apiUrl.replace('KEYWORD', encodeURIComponent(kw))
    : 'https://api.uomg.com/api/wy.music.search?key=' + encodeURIComponent(kw);
  try {
    const resp = await fetch(searchUrl);
    const data = await resp.json();
    if (data.code !== 1 || !data.data || !data.data.length) {
      list.innerHTML = '<div style="padding:12px;color:var(--text-muted);text-align:center">未找到<br><a href="#" onclick="searchMusic()" style="color:var(--accent)">在网易云中搜索</a></div>';
      return;
    }
    list.innerHTML = data.data.map(s => `
      <div class="music-item" onclick="selectMusic('${s.id}', '${escapeHtml(s.name).replace(/'/g, "\\'")} - ${escapeHtml(s.artist).replace(/'/g, "\\'")}')">
        <span class="music-item-name">${escapeHtml(s.name)}</span>
        <span class="music-item-artist">${escapeHtml(s.artist)}</span>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = '<div style="padding:12px;color:var(--text-muted);text-align:center">搜索失败<br><a href="#" onclick="searchMusic()" style="color:var(--accent)">在网易云中搜索</a></div>';
  }
}

function selectMusic(songId, label) {
  localStorage.setItem('musicId', songId);
  localStorage.setItem('musicUrl', '');
  localStorage.setItem('musicLabel', label);
  localStorage.setItem('musicOn', '1');
  hideMusicSearch();
  showMusicBar();
}

function setMusicUrlDirect() {
  var url = prompt('输入音乐直链URL（MP3格式）：', localStorage.getItem('musicUrl') || '');
  if (!url) return;
  localStorage.setItem('musicUrl', url);
  localStorage.setItem('musicId', '');
  localStorage.setItem('musicLabel', '自定义音乐');
  localStorage.setItem('musicOn', '1');
  hideMusicSearch();
  showMusicBar();
}

(function() {
  if (localStorage.getItem('musicOn') === '1') {
    document.getElementById('musicBtn').classList.add('playing');
    setTimeout(function() { showMusicBar(); }, 500);
  }
})();
</script>
<div class="toast" id="loginToast">
  <span>登录后可发布文章和评论</span>
  <button class="btn btn-primary btn-sm" onclick="showAuth('login')">登录</button>
  <label style="cursor:pointer;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px">
    <input type="checkbox" onchange="dismissLoginToast()">不再提示
  </label>
</div>
<div class="music-btn" id="musicBtn" onclick="toggleMusic()" title="点击显示/隐藏音乐播放器 | 双击搜索歌曲">&#9835;</div>
<audio id="bgMusic" loop style="display:none"></audio>
<div class="music-bar" id="musicBar" style="display:none">
  <button class="mbar-btn" id="mbarPlay" onclick="mbarToggle()">&#9654;</button>
  <span class="mbar-title" id="mbarTitle">未选择</span>
  <div class="mbar-progress" id="mbarProgress" onclick="mbarSeek(event)">
    <div class="mbar-progress-fill" id="mbarFill"></div>
  </div>
  <span class="mbar-time" id="mbarTime">0:00</span>
  <div class="mbar-vol-wrap">
    <input type="range" class="mbar-vol" id="mbarVol" min="0" max="100" value="50" oninput="mbarVolume()">
  </div>
  <button class="mbar-close" onclick="hideMusicBar()">&times;</button>
</div>
<div class="modal-overlay" id="musicOverlay" onclick="hideMusicSearch()" style="display:none"></div>
<div class="music-panel" id="musicPanel">
  <div class="music-panel-header">
    <span style="font-weight:600;font-size:14px">选择背景音乐</span>
    <a href="#" onclick="hideMusicSearch()" style="margin-left:auto;font-size:18px;color:var(--text-muted);text-decoration:none">&times;</a>
  </div>
  <div class="music-search-list" id="musicSearchList" style="max-height:200px;overflow-y:auto">
    <div style="padding:8px 10px;font-size:12px;color:var(--text-muted)">上传你自己的音乐（推荐）：</div>
    <div class="music-item" onclick="document.getElementById('musicFileInput').click()">
      <span class="music-item-name">+ 上传 MP3 文件</span>
      <span class="music-item-artist">从本地上传，最稳定</span>
    </div>
    <input type="file" id="musicFileInput" accept="audio/mpeg" onchange="uploadMusicFile(event)" style="display:none">
    <div style="padding:8px 10px;font-size:12px;color:var(--text-muted);border-top:1px solid rgba(255,255,255,0.1)">或输入直链播放：</div>
    <div class="music-item" onclick="setMusicUrlDirect()">
      <span class="music-item-name">输入音乐直链</span>
      <span class="music-item-artist">粘贴 MP3 直链地址</span>
    </div>
  </div>
  <div style="padding:10px;border-top:1px solid rgba(255,255,255,0.1);text-align:center">
    <a href="#" onclick="hideMusicSearch();setMusicUrlDirect()" style="font-size:12px;color:var(--accent)">或输入 MP3 直链</a>
  </div>
</div>
</body>
</html>
